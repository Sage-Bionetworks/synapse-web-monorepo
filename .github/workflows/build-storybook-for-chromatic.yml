name: 'Build Storybook for Chromatic'

env:
  NODE_OPTIONS: '--max-old-space-size=4096'

on:
  push:
    branches:
      - main
  pull_request:
    types: [labeled]
    branches:
      - main

permissions:
  contents: read

jobs:
  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    # On push, always build. On pull_request, only build when the 'chromatic' label is applied.
    if: ${{ github.event_name == 'push' || github.event.label.name == 'chromatic' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/pnpm-setup-action
      - name: Prebuild dependencies
        run: pnpm nx run synapse-react-client:build
      - name: Build Storybook
        run: pnpm nx run synapse-react-client:storybook:build
      - name: Upload Storybook artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: storybook-static
          path: packages/synapse-react-client/storybook-static
          retention-days: 1
