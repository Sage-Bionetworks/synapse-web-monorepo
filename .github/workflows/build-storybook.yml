name: 'Build Storybook'

env:
  NODE_OPTIONS: '--max-old-space-size=4096'

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - labeled
      - opened
      - synchronize
      - reopened
    branches:
      - main

permissions:
  contents: read

jobs:
  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    # Run on all events except labeled PRs without the 'chromatic' label
    if: ${{ github.event_name != 'labeled' || github.event.label.name == 'chromatic' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/pnpm-setup-action
      - name: Prebuild dependencies
        run: pnpm nx run synapse-react-client:build
      - name: Build Storybook
        run: pnpm nx run synapse-react-client:storybook:build
      - name: Upload Storybook artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: storybook-static
          path: packages/synapse-react-client/storybook-static
          retention-days: 1
