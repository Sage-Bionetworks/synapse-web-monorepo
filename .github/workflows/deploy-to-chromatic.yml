name: 'Deploy Storybook to Chromatic'

on:
  workflow_run:
    workflows: ['Build Storybook for Chromatic']
    types: [completed]

permissions:
  actions: read # needed to download artifacts from the triggering workflow run
  contents: read

jobs:
  deploy-to-chromatic:
    name: Deploy to Chromatic
    runs-on: ubuntu-latest
    # Only proceed if the upstream build workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          # Chromatic requires full git history to track changes
          fetch-depth: 0
      - name: Download Storybook artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: storybook-static
          path: packages/synapse-react-client/storybook-static
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Publish to Chromatic
        uses: chromaui/action@1cfa065cbdab28f6ca3afaeb3d761383076a35aa # v11.29.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/synapse-react-client
          exitZeroOnChanges: true
          exitOnceUploaded: true
          autoAcceptChanges: 'main'
          onlyChanged: true
          storybookBuildDir: storybook-static
